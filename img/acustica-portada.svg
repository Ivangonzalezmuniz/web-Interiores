<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fondo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#c9a96e"/>
    </linearGradient>
    <linearGradient id="onda1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#c9a96e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="onda2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f0d78c;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="onda3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#c9a96e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="400" fill="url(#fondo)"/>

  <!-- Círculos decorativos -->
  <circle cx="650" cy="80" r="120" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="650" cy="80" r="80" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="150" cy="320" r="90" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="150" cy="320" r="60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Ondas sonoras centrales -->
  <g filter="url(#glow)">
    <!-- Onda 1 (grande) -->
    <path d="M 100 200 Q 200 120 400 200 T 700 200" fill="none" stroke="url(#onda1)" stroke-width="3"/>
    <!-- Onda 2 (media) -->
    <path d="M 130 200 Q 230 140 400 200 T 670 200" fill="none" stroke="url(#onda2)" stroke-width="2.5"/>
    <!-- Onda 3 (pequeña) -->
    <path d="M 160 200 Q 260 160 400 200 T 640 200" fill="none" stroke="url(#onda3)" stroke-width="2"/>
    <!-- Línea central -->
    <line x1="80" y1="200" x2="720" y2="200" stroke="#c9a96e" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Altavoz izquierdo -->
  <g transform="translate(160, 145)">
    <rect x="0" y="0" width="50" height="75" rx="6" fill="#2c3e50" stroke="#c9a96e" stroke-width="1.5"/>
    <!-- Cono superior -->
    <circle cx="25" cy="22" r="13" fill="#1a1a2e" stroke="#c9a96e" stroke-width="1"/>
    <circle cx="25" cy="22" r="6" fill="#c9a96e" opacity="0.7"/>
    <!-- Cono inferior -->
    <circle cx="25" cy="52" r="9" fill="#1a1a2e" stroke="#c9a96e" stroke-width="1"/>
    <circle cx="25" cy="52" r="4" fill="#c9a96e" opacity="0.5"/>
    <!-- Ondas saliendo -->
    <path d="M 50 22 Q 60 22 58 22" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.6"/>
    <path d="M 50 22 Q 65 16 63 22" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.4"/>
    <path d="M 50 22 Q 65 28 63 22" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.4"/>
    <!-- Soporte -->
    <rect x="12" y="75" width="26" height="8" rx="2" fill="#c9a96e" opacity="0.4"/>
  </g>

  <!-- Altavoz derecho -->
  <g transform="translate(590, 145)">
    <rect x="0" y="0" width="50" height="75" rx="6" fill="#2c3e50" stroke="#c9a96e" stroke-width="1.5"/>
    <circle cx="25" cy="22" r="13" fill="#1a1a2e" stroke="#c9a96e" stroke-width="1"/>
    <circle cx="25" cy="22" r="6" fill="#c9a96e" opacity="0.7"/>
    <circle cx="25" cy="52" r="9" fill="#1a1a2e" stroke="#c9a96e" stroke-width="1"/>
    <circle cx="25" cy="52" r="4" fill="#c9a96e" opacity="0.5"/>
    <!-- Ondas saliendo (invertidas) -->
    <path d="M 0 22 Q -10 22 -8 22" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.6"/>
    <path d="M 0 22 Q -15 16 -13 22" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.4"/>
    <path d="M 0 22 Q -15 28 -13 22" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.4"/>
    <rect x="12" y="75" width="26" height="8" rx="2" fill="#c9a96e" opacity="0.4"/>
  </g>

  <!-- Silueta de sofá (oyente) -->
  <g transform="translate(360, 240)" filter="url(#glow)">
    <!-- Sofá -->
    <rect x="0" y="15" width="80" height="25" rx="8" fill="#c9a96e" opacity="0.3"/>
    <rect x="-5" y="0" width="20" height="40" rx="6" fill="#c9a96e" opacity="0.25"/>
    <rect x="65" y="0" width="20" height="40" rx="6" fill="#c9a96e" opacity="0.25"/>
    <!-- Cabeza del oyente -->
    <circle cx="40" cy="-8" r="10" fill="#c9a96e" opacity="0.5"/>
  </g>

  <!-- Notas musicales flotantes -->
  <g fill="#c9a96e" opacity="0.4">
    <text x="280" y="130" font-size="20" font-family="serif">♪</text>
    <text x="500" y="140" font-size="16" font-family="serif">♫</text>
    <text x="320" y="300" font-size="14" font-family="serif">♪</text>
    <text x="480" y="290" font-size="18" font-family="serif">♩</text>
    <text x="250" y="250" font-size="12" font-family="serif">♬</text>
  </g>

  <!-- Título -->
  <text x="400" y="370" text-anchor="middle" font-family="'Playfair Display', serif" font-size="28" fill="white" font-weight="700" letter-spacing="2">
    Diseño Acústico en el Salón
  </text>
  <line x1="200" y1="382" x2="600" y2="382" stroke="#c9a96e" stroke-width="1" opacity="0.4"/>

  <!-- Subtítulo -->
  <text x="400" y="395" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="3" text-transform="uppercase">
    CÓMO COLOCAR LOS ALTAVOCES Y CREAR UN SONIDO EQUILIBRADO
  </text>
</svg>